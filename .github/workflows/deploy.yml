name: Build and Deploy to Zeabur

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to Zeabur
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
          curl -s -X POST "https://api.zeabur.com/graphql" \
            -H "Authorization: Bearer ${{ secrets.ZEABUR_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { deployFromSpecification(serviceID: \\\"69c6242082fb34707a9f5068\\\", specification: { source: { image: \\\"$IMAGE\\\" } }) { deploymentID } }\"}"
